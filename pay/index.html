<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Payment - JL Solutions</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="/css/style.css">
  <link rel="icon" href="/assets/images/jlsolutions-logo.png" type="image/png">
  <style>
    body { background: #121212; color: #e0e0e0; min-height: 100vh; display: flex; align-items: center; }
    .pay-card { background: #1a1a1a; border-radius: 16px; padding: 2rem; max-width: 480px; margin: 0 auto; border: 1px solid rgba(255,255,255,0.1); }
    .pay-card h2 { color: #fff; margin-bottom: 1rem; }
    .form-control { background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2); color: #fff; }
    .form-control:focus { background: rgba(255,255,255,0.15); border-color: #0078D4; color: #fff; }
    .btn-pay { background: #0078D4; color: white; padding: 0.75rem 2rem; font-weight: 600; border: none; border-radius: 8px; }
    .btn-pay:hover { background: #005a9e; color: white; }
  </style>
</head>
<body>
  <div class="container">
    <div class="pay-card">
      <h2>Complete Payment</h2>
      <p class="text-muted mb-4">Enter your details and referral code (if any) to proceed to secure checkout.</p>
      <div id="payCanceled" class="d-none mb-3 p-3 rounded small" style="background: rgba(255,193,7,0.12); border: 1px solid rgba(255,193,7,0.35); color: #fff;" role="status">
        Checkout was canceled. Adjust the amount and try again, or <a href="/contact.html" class="text-warning">contact us</a>.
      </div>
      <form id="payForm">
        <p class="d-none" aria-hidden="true">
          <label>Leave empty: <input type="text" id="payBotField" name="bot-field" tabindex="-1" autocomplete="off" /></label>
        </p>
        <div class="mb-3">
          <label class="form-label">Name <span class="text-muted">(optional)</span></label>
          <input type="text" class="form-control" id="payName" placeholder="Your name" autocomplete="name">
        </div>
        <div class="mb-3">
          <label class="form-label">Email</label>
          <input type="email" class="form-control" id="email" required placeholder="you@example.com" autocomplete="email">
        </div>
        <div class="mb-3">
          <label class="form-label">Referral Code <span class="text-muted">(optional)</span></label>
          <input type="text" class="form-control" id="referralCode" placeholder="e.g. AGENT-ABC123" style="text-transform:uppercase;" autocomplete="off">
        </div>
        <div class="mb-4">
          <label class="form-label">Amount (USD)</label>
          <input type="number" class="form-control" id="amount" value="99" min="1" step="0.01" placeholder="99.00">
        </div>
        <button type="submit" class="btn btn-pay w-100" id="submitBtn">Proceed to Checkout</button>
      </form>
      <p class="small text-muted mt-3 mb-0">
        You will be redirected to Stripe for secure payment. JL Solutions never stores your card details.
      </p>
      <div class="mt-3">
        <a href="/" class="text-muted small">← Back to JL Solutions</a>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script>
    (function() {
      var q = new URLSearchParams(window.location.search);
      var ref = q.get('ref');
      if (ref) document.getElementById('referralCode').value = ref.toUpperCase();
      if (q.get('canceled') === '1') {
        var banner = document.getElementById('payCanceled');
        if (banner) banner.classList.remove('d-none');
      }
    })();
    document.getElementById('payForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const btn = document.getElementById('submitBtn');
      const base = window.location.origin;
      btn.disabled = true;
      btn.textContent = 'Redirecting...';
      const email = document.getElementById('email').value.trim();
      const payName = document.getElementById('payName');
      const name = payName ? payName.value.trim() : '';
      const referralCode = document.getElementById('referralCode').value.trim().toUpperCase() || undefined;
      const amount = parseFloat(document.getElementById('amount').value) || 99;
      const bot = document.getElementById('payBotField');
      const botVal = bot ? bot.value : '';

      try {
        const notify = new URLSearchParams();
        notify.set('form-name', 'pay-checkout');
        notify.set('bot-field', botVal);
        notify.set('email', email);
        notify.set('paymentAmount', String(amount));
        if (name) notify.set('name', name);
        if (referralCode) notify.set('referralCode', referralCode);

        const notifyRes = await fetch(base + '/.netlify/functions/send-form-email', {
          method: 'POST',
          headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
          body: notify.toString(),
          redirect: 'follow',
        });
        if (!notifyRes.ok) throw new Error('Could not notify team (HTTP ' + notifyRes.status + ')');

        const res = await fetch(base + '/.netlify/functions/stripe-checkout', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            amount,
            customerEmail: email,
            customerName: name || undefined,
            referralCode,
            description: 'JL Solutions Service',
            paymentSource: 'pay_page',
            successUrl: base + '/thank-you.html?session_id={CHECKOUT_SESSION_ID}&from=pay',
            cancelUrl: base + '/pay/?canceled=1',
          }),
        });
        const data = await res.json();
        if (data.url) {
          window.location.href = data.url;
        } else {
          throw new Error(data.error || 'Checkout failed');
        }
      } catch (err) {
        alert(err.message || 'Something went wrong. Please try again.');
        btn.disabled = false;
        btn.textContent = 'Proceed to Checkout';
      }
    });
  </script>
</body>
</html>
