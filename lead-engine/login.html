<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Lead engine sign in - JL Solutions</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="/css/style.css">
  <link rel="stylesheet" href="/css/lead-engine-ui.css">
  <link rel="icon" href="/assets/images/jlsolutions-logo.png" type="image/png">
  <style>
    body { background: #121212; color: #e8e8e8; min-height: 100vh; }
    .card-dark { background: #1a1a1a; border: 1px solid rgba(255,255,255,0.1); border-radius: 12px; }
    .text-muted { color: #b9bec8 !important; }
    .form-label { color: #d6dbe4 !important; }
    .form-control {
      color: #e8e8e8 !important;
      background-color: #111827 !important;
      border-color: #4b5563 !important;
    }
    .form-control:focus {
      color: #f3f4f6 !important;
      background-color: #111827 !important;
      border-color: #7c9cff !important;
      box-shadow: 0 0 0 0.2rem rgba(124, 156, 255, 0.25) !important;
    }
    .form-control::placeholder { color: #9aa3b2; opacity: 1; }
  </style>
</head>
<body class="lead-engine-surface">
  <div class="container py-5" style="max-width: 420px;">
    <p class="text-muted small mb-2"><a href="/" class="link-light text-decoration-none">JL Solutions</a></p>
    <h1 class="h4 mb-4">Lead engine (operators)</h1>
    <div class="card card-dark p-4">
      <form id="form">
        <div class="mb-3">
          <label class="form-label" for="username">Username</label>
          <input class="form-control bg-dark text-light border-secondary" id="username" name="username" autocomplete="username" required />
        </div>
        <div class="mb-3">
          <label class="form-label" for="password">Password</label>
          <input class="form-control bg-dark text-light border-secondary" id="password" name="password" type="password" autocomplete="current-password" required />
        </div>
        <p id="err" class="text-danger small" style="display:none;"></p>
        <p id="quickMsg" class="text-warning small mb-2" style="display:none;"></p>
        <button type="submit" class="btn btn-primary w-100" id="btn">Sign in</button>
        <button type="button" class="btn btn-outline-light w-100 mt-2" id="quickBtn">Quick sign in (local dev)</button>
      </form>
    </div>
    <p class="small mt-3 mb-1" style="color:#94a3b8;">Internal use only. Access is separate from the referral dashboard.</p>
    <p class="small mb-0" style="color:#64748b; line-height:1.45;"><strong>Local testing:</strong> run <code style="color:#cbd5e1;">npx netlify dev</code> from the repo root so <code style="color:#cbd5e1;">.env</code> loads. On Netlify, set <code style="color:#cbd5e1;">LEAD_ENGINE_SECRET</code> and <code style="color:#cbd5e1;">LEAD_ENGINE_OPERATORS</code> for scope <strong style="color:#94a3b8;">Functions</strong> (or All contexts).</p>
  </div>
  <script>
    document.getElementById('form').addEventListener('submit', async function (e) {
      e.preventDefault();
      const err = document.getElementById('err');
      const btn = document.getElementById('btn');
      err.style.display = 'none';
      btn.disabled = true;
      try {
        const res = await fetch('/.netlify/functions/lead-engine-auth', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          credentials: 'include',
          body: JSON.stringify({
            username: document.getElementById('username').value,
            password: document.getElementById('password').value,
          }),
        });
        const data = await res.json().catch(function () { return {}; });
        if (!res.ok) {
          err.textContent =
            (data.error || 'Sign in failed') + (data.details ? ' ' + data.details : '');
          err.style.display = 'block';
          return;
        }
        var q = new URLSearchParams(window.location.search).get('return');
        window.location.href = q && q.indexOf('/') === 0 ? q : '/lead-engine/';
      } catch {
        err.textContent = 'Network error';
        err.style.display = 'block';
      } finally {
        btn.disabled = false;
      }
    });

    document.getElementById('quickBtn').addEventListener('click', async function () {
      var err = document.getElementById('err');
      var quickMsg = document.getElementById('quickMsg');
      var quickBtn = document.getElementById('quickBtn');
      err.style.display = 'none';
      quickMsg.style.display = 'none';
      quickBtn.disabled = true;
      try {
        const res = await fetch('/.netlify/functions/lead-engine-auth', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          credentials: 'include',
          body: JSON.stringify({ devQuickLogin: true }),
        });
        const data = await res.json().catch(function () { return {}; });
        if (!res.ok) {
          quickMsg.textContent =
            data.error ||
            'Quick sign-in only works on localhost with netlify dev and operators configured.';
          quickMsg.style.display = 'block';
          return;
        }
        var q = new URLSearchParams(window.location.search).get('return');
        window.location.href = q && q.indexOf('/') === 0 ? q : '/lead-engine/';
      } catch {
        quickMsg.textContent = 'Network error';
        quickMsg.style.display = 'block';
      } finally {
        quickBtn.disabled = false;
      }
    });
  </script>
  <script src="/js/chatbot.js" defer></script>
</body>
</html>
