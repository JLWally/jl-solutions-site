# Smart demos (demo-config, lead-engine generate-demo) and some referral paths use Netlify Blobs
# (store name "smart-demos" in code). Locally: `npm run dev` after `netlify link` to THIS site.
# If the CLI shows "linked to" the wrong project, run `netlify unlink` then link again. Optional:
# NETLIFY_SITE_ID + NETLIFY_AUTH_TOKEN in .env for local Blob API access when context is not injected.

[build]
  publish = "."
  functions = "netlify/functions"

[functions]
  node_bundler = "esbuild"

# Lead engine: Scout → Qualifier → analyze/score/(demo)/draft for pending automation leads
[functions."lead-engine-automation-tick"]
  schedule = "@hourly"

# Onboarding wizard
[[redirects]]
  from = "/onboard"
  to = "/onboard/"
  status = 302
  force = true

# Sales portal: use root sales.html so it always loads
[[redirects]]
  from = "/sales/"
  to = "/sales.html"
  status = 302
  force = true

[[redirects]]
  from = "/sales"
  to = "/sales.html"
  status = 302
  force = true

