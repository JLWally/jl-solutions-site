[build]
  publish = "."
  functions = "netlify/functions"

[functions]
  node_bundler = "esbuild"

# Onboarding wizard
[[redirects]]
  from = "/onboard"
  to = "/onboard/"
  status = 302
  force = true

# Sales portal: use root sales.html so it always loads
[[redirects]]
  from = "/sales/"
  to = "/sales.html"
  status = 302
  force = true

[[redirects]]
  from = "/sales"
  to = "/sales.html"
  status = 302
  force = true

# Services: ai-intake-form without .html
[[redirects]]
  from = "/services/ai-intake-form"
  to = "/services/ai-intake-form.html"
  status = 302
  force = true

# Resources: hub as main entry
[[redirects]]
  from = "/resources"
  to = "/resources.html"
  status = 302
  force = true

# Resources: clean URLs without .html
[[redirects]]
  from = "/resources/process-documentation-template"
  to = "/resources/process-documentation-template.html"
  status = 302
  force = true

[[redirects]]
  from = "/resources/automation-checklist"
  to = "/resources/automation-checklist.html"
  status = 302
  force = true
