[build]
  publish = "."
  functions = "netlify/functions"

[functions]
  node_bundler = "esbuild"

# Onboarding wizard
[[redirects]]
  from = "/onboard"
  to = "/onboard/"
  status = 302
  force = true

# Sales portal: use root sales.html so it always loads
[[redirects]]
  from = "/sales/"
  to = "/sales.html"
  status = 302
  force = true

[[redirects]]
  from = "/sales"
  to = "/sales.html"
  status = 302
  force = true

# Services: ai-intake-form without .html
[[redirects]]
  from = "/services/ai-intake-form"
  to = "/services/ai-intake-form.html"
  status = 302
  force = true

# Resources: hub as main entry
[[redirects]]
  from = "/resources"
  to = "/resources.html"
  status = 302
  force = true

# Resources: clean URLs without .html
[[redirects]]
  from = "/resources/process-documentation-template"
  to = "/resources/process-documentation-template.html"
  status = 302
  force = true

[[redirects]]
  from = "/resources/automation-checklist"
  to = "/resources/automation-checklist.html"
  status = 302
  force = true

# Internal lead engine (static UI)
[[redirects]]
  from = "/lead-engine"
  to = "/lead-engine/"
  status = 302
  force = true

# Pretty URLs: rewrite (200) so POST bodies are not lost on 301/302 to .html
[[redirects]]
  from = "/contact"
  to = "/contact.html"
  status = 200

[[redirects]]
  from = "/book-consultation"
  to = "/book-consultation.html"
  status = 200

[[redirects]]
  from = "/contact/"
  to = "/contact.html"
  status = 200

[[redirects]]
  from = "/book-consultation/"
  to = "/book-consultation.html"
  status = 200

# Pre-checkout guided flow
[[redirects]]
  from = "/get-started"
  to = "/get-started.html"
  status = 200

[[redirects]]
  from = "/get-started/"
  to = "/get-started.html"
  status = 200

# Post-purchase intake (set Stripe Payment Link success URL to /onboarding?service=…)
[[redirects]]
  from = "/onboarding"
  to = "/onboarding/index.html"
  status = 200

[[redirects]]
  from = "/onboarding/"
  to = "/onboarding/index.html"
  status = 200

# No-hyphen alias (query string preserved) — use /get-started in links when possible
[[redirects]]
  from = "/getstarted"
  to = "/get-started"
  status = 301
  force = true

[[redirects]]
  from = "/getstarted/"
  to = "/get-started"
  status = 301
  force = true

# Legacy welcome URL → post-purchase onboarding
[[redirects]]
  from = "/services/welcome-after-purchase"
  to = "/onboarding"
  status = 301
  force = true

[[redirects]]
  from = "/services/welcome-after-purchase.html"
  to = "/onboarding"
  status = 301
  force = true

# Manual / invoice payments only (not productized package checkout)
[[redirects]]
  from = "/internal-pay"
  to = "/internal-pay/index.html"
  status = 200

[[redirects]]
  from = "/internal-pay/"
  to = "/internal-pay/index.html"
  status = 200

# Legacy site paths → get started (query string preserved by Netlify)
[[redirects]]
  from = "/pay/success.html"
  to = "/thank-you.html?from=stripe"
  status = 301
  force = true

[[redirects]]
  from = "/pay/cancel.html"
  to = "/get-started"
  status = 302
  force = true

[[redirects]]
  from = "/pay/"
  to = "/get-started"
  status = 302
  force = true

[[redirects]]
  from = "/pay/*"
  to = "/get-started"
  status = 302
  force = true

[[redirects]]
  from = "/pay"
  to = "/get-started"
  status = 302
  force = true
